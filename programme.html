    <img src="assets/logo.png" alt="Logo FarmOtor">
    <div>
      <h1 class="logo-title">FarmOtor's Transport</h1>
      <div class="muted">VTC Euro Truck Simulator 2</div>

  <nav class="menu">

<section class="page-title">
  <h2>Créer un programme convoi</h2>
  <p class="muted">Réservé au staff.</p>
</section>
<section class="form-wrap">
  <div class="form-card" style="max-width:1000px;width:100%">
    <form id="convoyForm">
      <div class="form-grid">
        <input id="entrepriseDepart" placeholder="Entreprise départ" required>
        <input id="depart" placeholder="Ville départ" required>
        <input id="entrepriseArrivee" placeholder="Entreprise arrivée" required>
        <input id="arrivee" placeholder="Ville arrivée" required>
        <input id="date" placeholder="Date" required>
        <input id="heure" placeholder="Heure" required>
        <input id="serveur" placeholder="Serveur TMP" required>
      </div>
      <button type="submit" class="btn btn-green">Créer le convoi</button>
    </form>
  </div>
</section>

<script src="config.js"></script>
<script src="script.js"></script>
</body>
