
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Discord</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<section class="hero">
  <div class="hero-card">
    <h2>Connexion Discord...</h2>
    <p class="muted">Patiente une seconde.</p>
  </div>
</section>
<script>
const hash = window.location.hash.substring(1);
const params = new URLSearchParams(hash);
const accessToken = params.get("access_token");
if(accessToken){
  localStorage.setItem("discordToken", accessToken);
  window.location.href = "index.html";
} else {
  document.body.innerHTML = '<section class="hero"><div class="hero-card"><h2>Connexion échouée</h2><p class="muted">Aucun token reçu depuis Discord.</p></div></section>';
}
</script>
</body>
</html>
